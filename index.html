<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Manager Pro</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/modules/layout.css">
  <link rel="stylesheet" href="css/modules/dashboard.css">
  <link rel="stylesheet" href="css/modules/modal.css">
  <link rel="stylesheet" href="css/modules/stats.css">
  
  <!-- Image Capture Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <script type="module" src="js/app.js"></script>
  <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()" defer></script>
  <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" defer></script>
  <script>
    // Failsafe: If the app hasn't loaded in 10 seconds, something might be wrong.
    setTimeout(() => {
      const overlay = document.getElementById('loadingOverlay');
      if (overlay && overlay.style.display !== 'none') {
        // If we've started rendering, we don't need to rescue
        if (window.appStarted) {
          overlay.style.display = 'none';
          return;
        }
        
        console.warn('App loading timeout. Attempting rescue...');
        overlay.style.display = 'none';
      }
    }, 10000);
  </script>
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="sidebar-logo">PROJECT<span>MANAGER</span></div>
    <div id="userEmail" class="user-tag">...</div>

    <div class="sidebar-clock">
      <div class="clock-display">
        <span id="clockTime" class="clock-time">00:00:00</span>
        <span id="clockDate" class="clock-date">Monday, 01 Jan 2024</span>
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="btn-sidebar-add" onclick="openModal()">
        <span>+</span> Create New Mission
      </button>
    </div>

    <div class="nav-label" style="margin-top: 8px;">Mission Quarter</div>
    <select id="quarterSelect" class="nav-select" onchange="window.setQuarter(this.value)"></select>

    <nav class="nav-group">
      <div class="nav-label">Main Views</div>
      <div class="filter-pill-group">
        <button id="filter-all" class="nav-btn active" onclick="setFilter('all', this)">All Projects</button>
        <button id="filter-today" class="nav-btn" onclick="setFilter('today', this)">Today Tasks</button>
      </div>
      
      <div class="nav-label" style="margin-top: 24px;">Status</div>
      <div class="filter-pill-group">
        <button id="filter-running" class="nav-btn" onclick="setFilter('running', this)">Running</button>
        <button id="filter-revision" class="nav-btn" onclick="setFilter('revision', this)">Revision</button>
        <button id="filter-delivered" class="nav-btn" onclick="setFilter('delivered', this)">Completed</button>
      </div>

      <div class="nav-label" style="margin-top: 24px;">Transfer</div>
      <div class="filter-pill-group">
        <button id="filter-transferred" class="nav-btn" onclick="setFilter('transferred', this)">Done</button>
        <button id="filter-not-transferred" class="nav-btn" onclick="setFilter('not-transferred', this)">Pending</button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout-sidebar" onclick="handleDisconnect()">Sign Out</button>
    </div>
  </aside>

  <!-- Main Workspace -->
  <main class="main-content">
    <div id="dashboard" class="dashboard-box" style="display:none">
      <div class="stats-row" id="insightsPanel"></div>

      <!-- Main Data Area (Table or Report Box) -->
      <div id="mainDisplayArea"></div>
    </div>
  </main>

  <div id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Hidden File Input for Data Import -->
  <input type="file" id="importFile" style="display:none" accept=".json" onchange="window.importData(event)">

  <div id="loginScreen" style="display:none; position: fixed; inset: 0; background: var(--bg); align-items: center; justify-content: center; z-index: 1000;">
    <div style="background: white; padding: 48px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center; max-width: 400px; border: 1px solid var(--border);">
      <div class="sidebar-logo" style="font-size: 28px; margin-bottom: 12px;">PROJECT<span>MANAGER</span></div>
      <p style="color: var(--text-muted); margin-bottom: 32px; font-size: 15px; font-weight: 500;">Premium freelance workspace.</p>
      <button class="btn-add" style="width: 100%;" onclick="handleAuthClick()">Sign in with Google</button>
    </div>
  </div>

  <div id="modalContainer" style="display:none">
    <div class="modal-overlay" onclick="handleOverlayClick(event)">
      <div class="modal">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-light); padding-bottom: 16px;">
          <h2 id="modalTitle" style="font-size: 18px; font-weight: 800; color: var(--primary);">Configure Project</h2>
          <div class="switch-container">
            <span class="switch-label">Today Task</span>
            <label class="switch">
              <input type="checkbox" id="fToday">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        
        <div class="modal-row">
          <label class="input-label">Title</label>
          <div class="input-field-wrapper">
            <input class="input-field" id="fName" placeholder="Project Name || ID" />
          </div>
        </div>

        <div class="modal-row" style="align-items: flex-start;">
          <label class="input-label" style="margin-top: 10px;">Notes</label>
          <div class="input-field-wrapper">
            <textarea class="input-field" id="fNotes" rows="2" placeholder="Brief project description..."></textarea>
          </div>
        </div>

        <div class="modal-row">
          <label class="input-label">Start</label>
          <div class="input-field-wrapper">
            <input class="input-field" type="date" id="fStart" onclick="this.showPicker()" />
          </div>
        </div>

        <div class="modal-row">
          <label class="input-label">Deadline</label>
          <div class="input-field-wrapper">
            <input class="input-field" type="datetime-local" id="fDeadline" onclick="this.showPicker()" />
          </div>
        </div>

        <div class="modal-row">
          <label class="input-label">Gross Value</label>
          <div class="input-field-wrapper">
            <input class="input-field" type="number" id="fValue" placeholder="$0.00" />
          </div>
        </div>

        <div class="modal-row">
          <label class="input-label">Status</label>
          <div class="input-field-wrapper">
            <div class="modal-pill-group">
              <label><input type="radio" name="fStatusPill" value="running" checked onclick="syncStatusSelect(this.value)"> Running</label>
              <label><input type="radio" name="fStatusPill" value="revision" onclick="syncStatusSelect(this.value)"> Revision</label>
              <label><input type="radio" name="fStatusPill" value="delivered" onclick="syncStatusSelect(this.value)"> Done</label>
            </div>
            <select id="fStatus" style="display:none" onchange="toggleDeliveryFields()">
              <option value="running">running</option>
              <option value="revision">revision</option>
              <option value="delivered">delivered</option>
            </select>
          </div>
        </div>

        <div class="modal-row">
          <label class="input-label">Transfer</label>
          <div class="input-field-wrapper">
            <div class="modal-pill-group">
              <label><input type="radio" name="fTransfer" value="no" checked> Pending</label>
              <label><input type="radio" name="fTransfer" value="yes"> Done</label>
            </div>
          </div>
        </div>

        <div id="deliverySection" style="display:none; border-top: 1px solid var(--border-light); margin-top: 16px; padding-top: 16px;">
          <div class="modal-row">
            <label class="input-label">Delivered</label>
            <div class="input-field-wrapper">
              <input class="input-field" type="date" id="fDeliveryDate" onclick="this.showPicker()" />
            </div>
          </div>
          <div class="modal-row">
            <label class="input-label">Final Share</label>
            <div class="input-field-wrapper">
              <input class="input-field" type="number" id="fShare" placeholder="Amount you keep ($)" />
            </div>
          </div>
          <div id="reviewedSection" class="modal-row">
            <label class="input-label">Rating</label>
            <div class="input-field-wrapper">
              <select class="input-field" id="fReviewed">
                <option value="no">No Review</option>
                <option value="1">⭐ 1 Star</option>
                <option value="2">⭐⭐ 2 Stars</option>
                <option value="3">⭐⭐⭐ 3 Stars</option>
                <option value="4">⭐⭐⭐⭐ 4 Stars</option>
                <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
              </select>
            </div>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; border-top: 1px solid var(--border-light); padding-top: 16px;">
          <button id="btnDelete" class="btn-action" style="color: var(--error); border-color: #fecaca; display: none;" onclick="deleteProjectFromModal()">Delete Mission</button>
          <div style="display: flex; gap: 8px; margin-left: auto;">
            <button class="btn-action" onclick="closeModal()">Cancel</button>
            <button class="btn-add" onclick="saveProject()">Update Project</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
